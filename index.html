<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 성지순례 미사 · 묵주기도 지향</title>
  <meta name="description" content="2026년 성지순례 — 날짜별 미사 지향과 묵주기도 지향을 확인하고, 봉헌자·지향 이름으로 검색하세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" /></noscript>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="eyebrow">✝ 2026 성지순례</p>
      <h1>미사 · 묵주기도 지향</h1>
      <p class="subtitle">파티마 · 알바 데 토르메스 · 아빌라 · 루르드 · 몬세라트 · 바르셀로나<br />6월 23일 — 7월 1일</p>
    </div>
  </header>

  <nav class="search-bar">
    <div class="wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="search" type="search" inputmode="search" autocomplete="off"
               placeholder="봉헌자 또는 지향 이름으로 검색 (예: 김태영, 정귀자)" />
        <button id="search-clear" class="search-clear" aria-label="지우기" hidden>✕</button>
      </div>
    </div>
  </nav>

  <main class="wrap">
    <!-- 검색 결과 -->
    <section id="search-results" class="search-results" hidden></section>

    <!-- 오늘의 지향 -->
    <section id="today" class="today-card" hidden></section>

    <!-- 날짜 탭 -->
    <section class="day-tabs-wrap">
      <div id="day-tabs" class="day-tabs"></div>
    </section>

    <!-- 날짜별 상세 -->
    <section id="day-detail" class="day-detail"></section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>매일 이곳에서 그날의 미사 지향과 묵주기도 지향을 확인하고 함께 기도합니다.</p>
      <p class="small">미사 지향은 파티마 · 루르드 미사에 봉헌되며, 묵주기도 지향은 순례 기간 동안 매일 봉헌됩니다.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
